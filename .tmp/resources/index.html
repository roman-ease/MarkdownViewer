<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <meta name="description" content="軽量Markdownビューア兼エディタ - Windows向けデスクトップアプリ">
  <link rel="stylesheet" href="libs/github-dark.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body id="app-body">
  <!-- ツールバー -->
  <header class="toolbar" id="toolbar">
    <div class="toolbar-left">
      <div class="app-brand">
        <svg class="app-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <span class="app-name">Markdown</span>
      </div>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" id="btn-new" title="新規作成 (Ctrl+N)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
        <span>新規</span>
      </button>
      <button class="toolbar-btn" id="btn-open" title="開く (Ctrl+O)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
        <span>開く</span>
      </button>
      <button class="toolbar-btn" id="btn-save" title="保存 (Ctrl+S)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
        <span>保存</span>
      </button>
      <button class="toolbar-btn" id="btn-save-as" title="名前を付けて保存 (Ctrl+Shift+S)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
          <line x1="21" y1="15" x2="21" y2="21" stroke-dasharray="2 2"></line>
        </svg>
        <span>別名保存</span>
      </button>
      <div class="toolbar-divider"></div>
      <div class="dropdown-container">
        <button class="toolbar-btn" id="btn-recent" title="最近使ったファイル">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <span>履歴</span>
        </button>
        <div class="dropdown-menu" id="recent-menu" style="display:none;">
          <div class="dropdown-title">最近使ったファイル</div>
          <ul id="recent-list" class="recent-list">
            <li class="recent-empty">履歴がありません</li>
          </ul>
        </div>
      </div>
      <div class="dropdown-container">
        <button class="toolbar-btn" id="btn-export-menu" title="エクスポート">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          <span>エクスポート</span>
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:-2px; opacity:0.7">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="dropdown-menu" id="export-dropdown" style="display:none;">
          <ul class="recent-list">
            <li id="menu-export-html">HTMLファイル...</li>
            <li id="menu-export-pdf">PDFファイル...</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="toolbar-center">
      <span class="file-title" id="file-title">無題</span>
      <span class="unsaved-dot" id="unsaved-dot" title="未保存の変更があります"></span>
    </div>
    <div class="toolbar-right">
      <button class="toolbar-btn toggle-btn" id="btn-toggle-view" title="表示切替">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" id="icon-split">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="12" y1="3" x2="12" y2="21"></line>
        </svg>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" id="icon-view" style="display:none;">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        </svg>
        <span id="toggle-label">ビューのみ</span>
      </button>
    </div>
  </header>

  <!-- タブバー -->
  <div id="tab-bar" class="tab-bar"></div>

  <!-- 外部変更通知バー -->
  <div class="notification-bar" id="notification-bar" style="display:none;">
    <span id="notification-text">ファイルが外部で変更されました。</span>
    <button class="notification-action" id="btn-reload">再読み込み</button>
    <button class="notification-dismiss" id="btn-dismiss-notification">✕</button>
  </div>

  <!-- メインコンテンツ -->
  <main class="editor-container" id="editor-container">
    <!-- エディタペイン -->
    <div class="pane editor-pane" id="editor-pane">
      <div class="pane-header">
        <span class="pane-label">エディタ</span>
      </div>
      <textarea
        id="editor"
        class="editor-textarea"
        placeholder="Markdown を入力してください..."
        spellcheck="false"
      ></textarea>
    </div>

    <!-- リサイザー -->
    <div class="resizer" id="resizer"></div>

    <!-- プレビューペイン -->
    <div class="pane preview-pane" id="preview-pane">
      <div class="pane-header">
        <span class="pane-label">プレビュー</span>
      </div>
      <div id="preview" class="preview-content markdown-body"></div>
    </div>
  </main>

  <!-- ステータスバー -->
  <footer class="statusbar" id="statusbar">
    <span class="statusbar-item" id="status-file">新規ファイル</span>
    <span class="statusbar-item" id="status-encoding">UTF-8</span>
    <span class="statusbar-item" id="status-lines">0 行</span>
  </footer>

  <!-- スクリプト -->
  <script src="js/neutralino.js"></script>
  <script src="libs/highlight.min.js"></script>
  <script src="libs/marked.min.js"></script>
  <script src="libs/mermaid.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
